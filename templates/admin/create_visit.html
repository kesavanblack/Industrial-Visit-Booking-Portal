{% extends 'common/base.html' %}

{% block title %}Create Visit - IV Portal{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow mt-4">
            <div class="card-header bg-dark text-white">
                <h4>Create New Industrial Visit</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label for="industry" class="form-label">Select Industry</label>
                        <select class="form-select" id="industry" name="industry" required>
                            <option value="">Choose...</option>
                            {% for industry in industries %}
                            <option value="{{ industry.id }}">{{ industry.name }}</option>
                            {% endfor %}
                        </select>
                        <div class="form-text">If industry is not listed, <a
                                href="{{ url_for('admin.add_industry') }}">add it here</a>.</div>
                    </div>

                    <div class="mb-3">
                        <label for="title" class="form-label">Visit Title</label>
                        <input type="text" class="form-control" id="title" name="title"
                            placeholder="e.g., Industrial Visit to Infosys" required>
                    </div>

                    <div class="mb-3">
                        <label for="description" class="form-label">Description</label>
                        <textarea class="form-control" id="description" name="description" rows="3"></textarea>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="visit_date" class="form-label">Visit Date</label>
                            <input type="date" class="form-control" id="visit_date" name="visit_date" required>
                        </div>
                        <div class="col-md-6">
                            <label for="fee" class="form-label">Registration Fee (₹)</label>
                            <input type="number" step="0.01" class="form-control" id="fee" name="fee" value="0.00">
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="total_seats" class="form-label">Total Seats</label>
                            <input type="number" class="form-control" id="total_seats" name="total_seats" required>
                        </div>
                        <div class="col-md-6">
                            <label for="faculty" class="form-label">Assign Faculty Coordinator</label>
                            <select class="form-select" id="faculty" name="faculty">
                                <option value="">None</option>
                                {% for faculty in faculties %}
                                <option value="{{ faculty.id }}">{{ faculty.name }} ({{ faculty.department }})</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-success">Create Visit</button>
                    <a href="{{ url_for('admin.dashboard') }}" class="btn btn-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
