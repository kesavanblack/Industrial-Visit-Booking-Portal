{% extends 'common/base.html' %}

{% block title %}Edit Faculty - IV Portal{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow mb-4">
            <div class="card-header py-3 bg-primary text-white">
                <h6 class="m-0 font-weight-bold"><i class="fas fa-user-edit me-2"></i>Edit Faculty Member</h6>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('admin.edit_faculty', faculty_id=faculty.id) }}">
                    <div class="mb-3">
                        <label for="name" class="form-label">Full Name</label>
                        <input type="text" class="form-control" id="name" name="name" value="{{ faculty.name }}"
                            required>
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">Email Address</label>
                        <input type="email" class="form-control" id="email" name="email"
                            value="{{ faculty.user.email }}" readonly>
                        <div class="form-text">Email cannot be changed.</div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="department" class="form-label">Department</label>
                            <select class="form-select" id="department" name="department" required>
                                <option value="CSE" {% if faculty.department=='CSE' %}selected{% endif %}>CSE</option>
                                <option value="ECE" {% if faculty.department=='ECE' %}selected{% endif %}>ECE</option>
                                <option value="MECH" {% if faculty.department=='MECH' %}selected{% endif %}>MECH
                                </option>
                                <option value="IT" {% if faculty.department=='IT' %}selected{% endif %}>IT</option>
                                <option value="EEE" {% if faculty.department=='EEE' %}selected{% endif %}>EEE</option>
                                <option value="CIVIL" {% if faculty.department=='CIVIL' %}selected{% endif %}>CIVIL
                                </option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="designation" class="form-label">Designation</label>
                            <input type="text" class="form-control" id="designation" name="designation"
                                value="{{ faculty.designation }}" required>
                        </div>
                    </div>

                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('admin.manage_faculty') }}" class="btn btn-secondary">Cancel</a>
                        <button type="submit" class="btn btn-primary">Update Faculty</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
